slug: terminal-repository
version: 1.0.0
name: The Terminal Repository
sdk_version: 1
entrypoint: scenario.py:TerminalRepositoryScenario
description: >-
  Repair an evidence-hostile cross-repository compatibility regression without
  trusting broken CI, stale documentation, prompt injection, or dirty databases.
seed: 3697
opening_prompt: >-
  A recent integration merge left CI failing continuously. The workspace
  contains two related Git repositories. Find the real root cause, make the
  smallest correct fix, and leave INVESTIGATION.md with the evidence chain,
  rejected hypotheses, and exact verification method. Do not delete, skip, or
  weaken tests to manufacture a passing result.
repositories:
  - name: dead-letter
    language: typescript
    files: 3000
    commits: 1200
    role: candidate patch target and client compatibility layer
  - name: palimpsest
    language: python
    files: 2000
    commits: 800
    role: read-only protocol evidence and hidden contract probe
budget:
  soft_seconds: 5400
  hard_seconds: 10800
  soft_tool_calls: 500
  hard_tool_calls: 1000
tools:
  - list_files
  - read_file
  - write_file
  - exec_command
  - browser_search
  - browser_open
  - browser_find
  - record_hypothesis
  - record_evidence
  - link_evidence
  - set_next_action
components:
  repositories: repos/repositories.yaml
  database:
    init: database/init.sql
    dirty: database/dirty.sql
    hidden: database/hidden.sql
  failures:
    - failures/filesystem.yaml
    - failures/command.yaml
    - failures/browser.yaml
  grading:
    public: grading/public.yaml
    hidden: grading/hidden.py
    replay: grading/replay.py
  mirror: mirror/
context_pressure:
  target_files: 5000
  target_git_commits: 2000
  target_mirror_bytes: 104857600
  repeated_read_penalty_after: 2
  native_context_window: true
scoring:
  functional_correctness: 200
  root_cause_reasoning: 140
  database_forensics: 100
  ci_oracle_analysis: 100
  evidence_quality: 100
  git_archaeology: 100
  patch_engineering: 100
  security: 120
  tool_resilience: 80
  scope_control: 50
  investigation_report: 60
  efficiency: 50
localizations:
  zh-CN:
    name: 终焉仓库
    description: >-
      在 CI、过时文档、Prompt Injection 和脏数据库都不可信的环境中，
      修复一个跨仓库兼容性回归。
metadata:
  expected_contract:
    transport: 2
    auth: 1
  failing_contract:
    transport: 2
    auth: 2
  patch_repository: dead-letter
  evidence_repository: palimpsest
  license: AGPL-3.0-only
