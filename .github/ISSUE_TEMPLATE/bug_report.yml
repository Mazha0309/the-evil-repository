name: Bug report
description: Report a reproducible defect in the platform or bundled scenario
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report sandbox escapes or credential exposure here. Use the private process in SECURITY.md.
  - type: input
    id: commit
    attributes:
      label: Commit
      description: The exact commit or release tested.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal commands, scenario version, and model-profile settings with all secrets removed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Docker/rootless status, Node, pnpm, Python, and uv versions.
    validations:
      required: true
